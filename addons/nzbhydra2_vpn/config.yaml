name: NZBHydra2 + Gluetun
version: 0.1.3
slug: nzbhydra2_vpn
description: Home Assistant Add-on scaffold with Gluetun and NZBHydra2 containers
url: https://github.com/matzewr/ha-addons
arch:
  - amd64
  - aarch64
startup: services
boot: auto
init: false
docker_api: true
options:
  TZ: Europe/Berlin
  WEBUI_PORT: 5076
schema:
  TZ: str
  WEBUI_PORT: port
  SERVER_COUNTRIES: str?
ports:
  5076/tcp: null
ports_description:
  5076/tcp: NZBHydra2 Web UI
map:
  - type: addon_config
    read_only: false
    path: /config
image: ghcr.io/matzewr/nzbhydra2-vpn
